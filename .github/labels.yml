# ============================================================
# Late-Meet — Centralized Label Configuration
# ============================================================
# This file is the SINGLE SOURCE OF TRUTH for all repository labels.
# Labels defined here are synced to GitHub via the Label Sync workflow.
# Any label not defined here will NOT be deleted (delete-other-labels: false).
#
# To add a new label: Add an entry below and push to main.
# To rename a label: Use the 'aliases' field to preserve old references.
# To change a color: Update the 'color' field and push to main.
# ============================================================

# ─── GitHub Defaults ─────────────────────────────────────────
- name: bug
  color: "d73a4a"
  description: "Something isn't working"

- name: documentation
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: enhancement
  color: "a2eeef"
  description: "New feature or request"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: duplicate
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: wontfix
  color: "ffffff"
  description: "This will not be worked on"

- name: invalid
  color: "e4e669"
  description: "This doesn't seem right"

# ─── Difficulty Levels (GSSoC Scoring) ───────────────────────
- name: "level:beginner"
  color: "7057ff"
  description: "Difficulty level: Beginner (20 pts)"

- name: "level:intermediate"
  color: "fbca04"
  description: "Difficulty level: Intermediate (35 pts)"

- name: "level:advanced"
  color: "e11d48"
  description: "Difficulty level: Advanced (55 pts)"

